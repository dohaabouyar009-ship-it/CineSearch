<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CineSearch</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<header>
    <img src="logo.svg" id="logo">

    <div class="header-right">
        <span id="btnFavoritos" onclick="verFavoritos()">🤍</span>

        <button id="btnLogin" onclick="abrirLogin()">Login</button>

        <div id="avatar" onclick="toggleMenu()" style="display:none"></div>
    </div>

    <div id="menuUser" class="menu-user">
        <p id="userEmail"></p>
        <button onclick="cerrarSesion()">Cerrar sesión</button>
    </div>
</header>

<div class="buscador">
    <input type="text" id="search" placeholder="Busca una película..." onkeydown="if(event.key==='Enter') buscar()">
    <button onclick="buscar()">Buscar 🔎</button>
</div>

<div id="resultados"></div>

<!-- MODAL DETALLE -->
<div id="modal" class="modal">
    <div class="modal-content">
        <span onclick="cerrarModal()" class="cerrar">✖</span>
        <div id="detalle"></div>
    </div>
</div>

<!-- LOGIN -->
<div id="loginModal" class="modal">
    <div class="modal-content">
        <span onclick="cerrarLogin()" class="cerrar">✖</span>
        <h2>Iniciar sesión</h2>
        <input type="email" id="email" placeholder="Email"><br><br>
        <input type="password" id="password" placeholder="Contraseña"><br><br>
        <button onclick="login()">Entrar</button>
        <button onclick="registro()">Registrarse</button>
    </div>
</div>

<!-- FAVORITOS -->
<div id="favoritosModal" class="modal">
    <div class="modal-content">
        <span onclick="cerrarFavoritos()" class="cerrar">✖</span>
        <h2>❤️ Favoritos</h2>
        <div id="listaFavoritos"></div>
    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>

</body>
</html>
