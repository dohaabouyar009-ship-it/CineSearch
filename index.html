<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CineSearch</title>

<link rel="stylesheet" href="style.css">

</head>
<body>

<header>
    <img src="logo.svg" id="logo">

    <div class="header-actions">
        <span id="btnFavoritos" onclick="verFavoritos()">❤️</span>

        <div id="avatarWrapper">
            <button id="btnLogin" onclick="abrirLogin()">Login</button>

            <div id="avatarBtn" onclick="toggleUserMenu()" style="display:none">
                <span id="avatarInitial"></span>
            </div>
        </div>
    </div>

    <div id="userMenu" class="user-menu">
        <p id="menuEmail"></p>
        <button onclick="cerrarSesion()">Cerrar sesión</button>
    </div>
</header>

<div class="buscador">
    <input type="text" id="search" placeholder="Busca una película..." onkeydown="if(event.key==='Enter') buscar()">
    <button onclick="buscar()">🔍 Buscar</button>
</div>

<div id="resultados"></div>

<!-- DETALLE -->
<div id="modal" class="modal">
    <div class="modal-content">
        <span class="cerrar" onclick="cerrarModal()">X</span>
        <div id="detalle"></div>
    </div>
</div>

<!-- LOGIN -->
<div id="loginModal" class="modal">
    <div class="modal-content">
        <span class="cerrar" onclick="cerrarLogin()">X</span>
        <input id="email" placeholder="Email">
        <input id="password" type="password" placeholder="Password">
        <button onclick="login()">Entrar</button>
        <button onclick="registro()">Crear cuenta</button>
    </div>
</div>

<!-- FAVORITOS -->
<div id="favoritosModal" class="modal">
    <div class="modal-content">
        <span class="cerrar" onclick="cerrarFavoritos()">X</span>
        <h2>❤️ Favoritos</h2>
        <div id="listaFavoritos"></div>
    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>

<script src="script.js"></script>
</body>
</html>
