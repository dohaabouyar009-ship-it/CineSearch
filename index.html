<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CineSearch</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
    <img src="logo.svg" id="logo">

    <button onclick="verFavoritos()" id="btnFav">❤️</button>
    
    <!-- Contenedor del perfil con dropdown -->
    <div id="profileContainer">
        <button onclick="abrirLogin()" id="btnLogin">Login</button>
        <div id="profileDropdown" class="dropdown-menu">
            <img id="dropdownAvatar" src="" alt="Foto de perfil">
            <p id="dropdownEmail"></p>
            <button onclick="logout()">Cerrar sesión</button>
        </div>
    </div>
</header>
<!-- NUEVO: MENÚ DE GÉNEROS -->
<nav id="menuGeneros">
    <button onclick="filtrarPorGenero(0)" class="genero-btn activo">🔥 Populares</button>
    <button onclick="filtrarPorGenero(28)" class="genero-btn">💥 Acción</button>
    <button onclick="filtrarPorGenero(35)" class="genero-btn">😂 Comedia</button>
    <button onclick="filtrarPorGenero(18)" class="genero-btn">🎭 Drama</button>
    <button onclick="filtrarPorGenero(27)" class="genero-btn">👻 Terror</button>
    <button onclick="filtrarPorGenero(10749)" class="genero-btn">❤️ Romance</button>
    <button onclick="filtrarPorGenero(878)" class="genero-btn">🚀 Ciencia Ficción</button>
    <button onclick="filtrarPorGenero(16)" class="genero-btn">🎨 Animación</button>
    <button onclick="filtrarPorGenero(53)" class="genero-btn">🔪 Thriller</button>
    <button onclick="filtrarPorGenero(12)" class="genero-btn">🏴‍☠️ Aventura</button>
    <button onclick="filtrarPorGenero(80)" class="genero-btn">🔫 Crimen</button>
    <button onclick="filtrarPorGenero(14)" class="genero-btn">🧙 Fantasía</button>
</nav>
<div class="buscador">
    <input type="text" id="search" placeholder="Busca una peli o serie...">
    <button onclick="buscar()">Buscar 🔎</button>
</div>

<div id="resultados"></div>

<!-- MODAL DETALLE -->
<div id="modal" class="modal">
    <div class="modal-content">
        <span onclick="cerrarModal()" class="cerrar">✖</span>
        <div id="detalle"></div>
    </div>
</div>

<!-- LOGIN -->
<div id="loginModal" class="modal">
    <div class="modal-content">
        <span onclick="cerrarLogin()" class="cerrar">✖</span>
        <h2>Login</h2>
        <input type="email" id="email" placeholder="Email"><br><br>
        <input type="password" id="password" placeholder="Contraseña"><br><br>
        <button onclick="login()">Entrar</button>
        <button onclick="registro()">Registrarse</button>
    </div>
</div>

<!-- FAVORITOS -->
<div id="favModal" class="modal">
    <div class="modal-content">
        <span onclick="cerrarFav()" class="cerrar">✖</span>
        <h2>❤️ Favoritos</h2>
        <div id="listaFav"></div>
    </div>
</div>

</body>
</html>
