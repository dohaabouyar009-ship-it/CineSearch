<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CineSearch</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
    <img src="logo.svg" id="logo">

    <button onclick="verFavoritos()" id="btnFav">❤️</button>
    
    <!-- NUEVO: Contenedor del perfil con dropdown -->
    <div id="profileContainer">
        <button onclick="abrirLogin()" id="btnLogin">Login</button>
        <div id="profileDropdown" class="dropdown-menu">
            <img id="dropdownAvatar" src="" alt="Foto de perfil">
            <p id="dropdownEmail"></p>
            <button onclick="logout()">Cerrar sesión</button>
        </div>
    </div>
</header>

<div class="buscador">
    <input type="text" id="search" placeholder="Busca una peli o serie...">
    <button onclick="buscar()">Buscar 🔎</button>
</div>

<div id="resultados"></div>

<!-- MODAL DETALLE -->
<div id="modal" class="modal">
    <div class="modal-content">
        <span onclick="cerrarModal()" class="cerrar">✖</span>
        <div id="detalle"></div>
    </div>
</div>

<!-- LOGIN -->
<div id="loginModal" class="modal">
    <div class="modal-content">
        <span onclick="cerrarLogin()" class="cerrar">✖</span>
        <h2>Login</h2>
        <input type="email" id="email" placeholder="Email"><br><br>
        <input type="password" id="password" placeholder="Contraseña"><br><br>
        <button onclick="login()">Entrar</button>
        <button onclick="registro()">Registrarse</button>
    </div>
</div>

<!-- FAVORITOS -->
<div id="favModal" class="modal">
    <div class="modal-content">
        <span onclick="cerrarFav()" class="cerrar">✖</span>
        <h2>❤️ Favoritos</h2>
        <div id="listaFav"></div>
    </div>
</div>

<!-- FIREBASE -->
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>

<script>
const firebaseConfig = {
  apiKey: "TU_API_KEY",
  authDomain: "TU_DOMINIO",
  projectId: "TU_ID",
};

firebase.initializeApp(firebaseConfig);
</script>

<script src="script.js"></script>

</body>
</html>
