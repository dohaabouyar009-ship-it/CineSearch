<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CineSearch</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
    <img src="logo.svg" alt="CineSearch" id="logo">
</header>

<div class="buscador">
    <input type="text" id="search" placeholder="Busca una peli o serie...">
    <button onclick="buscar()">Buscar 🔎</button>
</div>

<div id="resultados"></div>

<div id="modal" class="modal">
    <div class="modal-content">
        <span onclick="cerrarModal()" class="cerrar">✖</span>
        <div id="detalle"></div>
    </div>
</div>

<script src="script.js"></script>

</body>
</html>
